name: stock selector 选股

on:
  workflow_dispatch:

jobs:
  sector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sector screener
        env:
          TZ: Asia/Shanghai
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python run_sector.py

      - name: Upload sector results
        uses: actions/upload-artifact@v4
        with:
          name: sector-results
          path: sector_results.json
          retention-days: 1

  etf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run etf screener
        env:
          TZ: Asia/Shanghai
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python run_etf.py

  stock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stock screener
        env:
          TZ: Asia/Shanghai
          TUSHARE_TOKEN:      ${{ secrets.TUSHARE_TOKEN }}
          JQ_USERNAME:        ${{ secrets.JQ_USERNAME }}
          JQ_PASSWORD:        ${{ secrets.JQ_PASSWORD }}
          MAIRUI_TOKEN:       ${{ secrets.MAIRUI_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          LLM_MODEL:          ${{ secrets.LLM_MODEL }}
          LLM_FALLBACK_MODEL: ${{ secrets.LLM_FALLBACK_MODEL }}
          TAVILY_API_KEY:     ${{ secrets.TAVILY_API_KEY }}
          GIST_PAT:           ${{ secrets.GIST_PAT }}
          GIST_ID:            ${{ secrets.GIST_ID }}
        run: |
          python main.py
