# stock selector 配置文件

datasources:
  tushare_token: ""
  joinquant_username: ""
  joinquant_password: ""
  mairui_token: ""

screener:
  price_min: 3
  price_max: 70
  min_listed_days: 730
  weekly_ma: 25
  vol_ma_short: 5
  vol_ma_long: 60
  vol_deviation_min: -0.03
  vol_deviation_max: 0.07
  min_daily_amount: 300000000
  spot_prefilter_amount: 200000000
  weekly_mode: "realtime"

request:
  max_workers: 8
  delay_min: 0.2
  delay_max: 0.5
  max_retries: 3
  retry_backoff: 2

wecom:
  webhook_url: ""

plugins:
  ai_analysis:
    enabled: true
  llm_analysis:
    enabled: true
    primary_model: "gemini-2.5-flash"      # 主模型
    fallback_model: "deepseek-reasoner"   # 备用模型（当主模型失败时自动切换）
    api_key: ""                           # 主模型API Key（留空则使用环境变量）
    deepseek_api_url: ""                  # DeepSeek API URL（留空则使用默认值）
    gemini_api_url: ""                    # Gemini API URL（留空则使用默认值）
    # 三级降级：Gemini(#1) → Gemini(#2) → DeepSeek
    # 设置环境变量 GEMINI_API_KEY_2 和 GEMINI_MODEL_2 启用第二 Gemini Key
  stock_list_analysis:
    enabled: true
  technical_analysis:
    enabled: true
  fundamental_analysis:
    enabled: false

# Scrapling 新闻抓取配置
# 设置环境变量 SCRAPLING_MODE=basic(默认) 或 stealth(Playwright反爬)
scrapling:
  mode: "basic"  # basic: HTTP直接请求(快) | stealth: Playwright反爬(慢但稳)
