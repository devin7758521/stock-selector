# stock selector 配置文件

datasources:
  tushare_token: ""
  joinquant_username: ""
  joinquant_password: ""
  mairui_token: ""

screener:
  price_min: 3
  price_max: 70
  min_listed_days: 730
  weekly_ma: 25
  vol_ma_short: 5
  vol_ma_long: 60
  vol_deviation_min: -0.03
  vol_deviation_max: 0.07
  min_daily_amount: 300000000
  spot_prefilter_amount: 200000000
  weekly_mode: "realtime"

request:
  max_workers: 8
  delay_min: 0.2
  delay_max: 0.5
  max_retries: 3
  retry_backoff: 2

wecom:
  webhook_url: ""

plugins:
  ai_analysis:
    enabled: true
  llm_analysis:
    enabled: true
    primary_model: "gemini-2.0-flash"      # 主模型
    fallback_model: "deepseek-reasoner"   # 备用模型（当主模型失败时自动切换）
    api_key: ""                           # 主模型API Key（留空则使用环境变量）
  stock_list_analysis:
    enabled: true
  technical_analysis:
    enabled: true
  fundamental_analysis:
    enabled: false
